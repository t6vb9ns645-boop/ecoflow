name: Create Releases

on:
  workflow_dispatch:

jobs:
  create-releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v1.0.0 --target b14c62b --title "v1.0.0" --notes "Initial GitHub Actions edition"
          gh release create v2.0.0 --target c752978 --title "v2.0.0" --notes "All API metrics (20 fields), CSV migration, forecast panel"
          gh release create v3.0.0 --target 2af4ac3 --title "v3.0.0" --notes "Professional dashboard v3 - 6 sections, Datenqualitaet area, CHANGELOG"
