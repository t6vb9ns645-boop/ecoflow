name: EcoFlow Data Collector

on:
  schedule:
    - cron: '*/5 * * * *'  # Alle 5 Minuten (GitHub-Minimum)
  workflow_dispatch:

# pages: write + id-token: write sind für den deploy-pages-Job erforderlich
permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  collect-data:
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EcoFlow tracker
        env:
          ECOFLOW_ACCESS_KEY: ${{ secrets.ECOFLOW_ACCESS_KEY }}
          ECOFLOW_SECRET_KEY: ${{ secrets.ECOFLOW_SECRET_KEY }}
          POWERSTREAM_SN: ${{ secrets.POWERSTREAM_SN }}
          DELTA3_SN: ${{ secrets.DELTA3_SN }}
        run: python ecoflow_tracker_github.py

      - name: Commit updated CSV to repository
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ecoflow_energie_daten.csv
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: add measurement $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

  # Läuft direkt nach collect-data im selben Workflow-Run — kein separater
  # workflow_dispatch nötig, spart ~2 min Runner-Startzeit.
  deploy-pages:
    needs: collect-data
    if: needs.collect-data.outputs.committed == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout (mit frischen Daten)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
