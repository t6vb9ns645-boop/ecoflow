name: EcoFlow Data Collector

# ============================================================================
# TRIGGER: Wann soll der Workflow laufen?
# ============================================================================

on:
  # Zeitgesteuert (Schedule) - alle 1 Minute
  schedule:
    - cron: '* * * * *'  # Alle 1 Minute (UTC)
  
  # Manuell ausführbar
  workflow_dispatch:

# ============================================================================
# JOBS: Was soll ausgeführt werden?
# ============================================================================

jobs:
  collect-data:
    runs-on: ubuntu-latest
    
    steps:
      # Schritt 1: Code aus Repository klonen
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # Schritt 2: Python installieren
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # Schritt 3: Dependencies installieren
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # Schritt 4: EcoFlow Tracker ausführen
      - name: 🌞 Run EcoFlow tracker
        env:
          # Environment Variables aus GitHub Secrets
          ECOFLOW_ACCESS_KEY: ${{ secrets.ECOFLOW_ACCESS_KEY }}
          ECOFLOW_SECRET_KEY: ${{ secrets.ECOFLOW_SECRET_KEY }}
          POWERSTREAM_SN: ${{ secrets.POWERSTREAM_SN }}
          DELTA3_SN: ${{ secrets.DELTA3_SN }}
        run: python ecoflow_tracker_github.py
      
      # Schritt 5: CSV als Artifact speichern
      - name: 📊 Upload CSV as artifact
        if: always()  # Auch speichern wenn Fehler auftritt
        uses: actions/upload-artifact@v4
        with:
          name: ecoflow-data
          path: ecoflow_energie_daten.csv
          retention-days: 90  # 90 Tage speichern
      
      # Schritt 6: Erfolgs-Meldung
      - name: ✅ Success notification
        if: success()
        run: echo "🎉 Workflow erfolgreich abgeschlossen!"
      
      # Schritt 7: Fehler-Meldung
      - name: ❌ Failure notification
        if: failure()
        run: echo "❌ Workflow fehlgeschlagen - Logs prüfen!"

# ============================================================================
# WEITERE INFOS
# ============================================================================
#
# Cron Syntax erklären:
#   * * * * *
#   | | | | |
#   | | | | +-- Wochentag (0-6, 0=Sonntag)
#   | | | +---- Monat (1-12)
#   | | +------ Tag (1-31)
#   | +-------- Stunde (0-23, UTC!)
#   +---------- Minute (0-59)
#
# Beispiele:
#   '* * * * *'           = Alle 1 Minute
#   '*/5 * * * *'         = Alle 5 Minuten
#   '0 * * * *'           = Jede volle Stunde
#   '0 0 * * *'           = Täglich um 00:00 UTC
#   '0 6 * * *'           = Täglich um 06:00 UTC
#   '0 0 * * 0'           = Sonntag um 00:00 UTC
#
# Timezone: GitHub Actions läuft immer in UTC!
# Für andere Zeitzonen: Entsprechend berechnen
#
# Test: https://crontab.guru
#
# ============================================================================
