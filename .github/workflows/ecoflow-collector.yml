name: EcoFlow Data Collector

on:
  schedule:
    - cron: '*/5 * * * *'  # Alle 5 Minuten (GitHub-Minimum)
  workflow_dispatch:

# Schreibzugriff auf das Repository nötig, um CSV zu committen
# actions:write nötig, um deploy-pages.yml nach Datenpush auszulösen
permissions:
  contents: write
  actions: write

jobs:
  collect-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run EcoFlow tracker
        env:
          ECOFLOW_ACCESS_KEY: ${{ secrets.ECOFLOW_ACCESS_KEY }}
          ECOFLOW_SECRET_KEY: ${{ secrets.ECOFLOW_SECRET_KEY }}
          POWERSTREAM_SN: ${{ secrets.POWERSTREAM_SN }}
          DELTA3_SN: ${{ secrets.DELTA3_SN }}
        run: python ecoflow_tracker_github.py

      - name: Commit updated CSV to repository
        id: commit
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/ecoflow_energie_daten.csv
          if git diff --staged --quiet; then
            echo "committed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "data: add measurement $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Pages deploy with fresh CSV
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-pages.yml --ref main
